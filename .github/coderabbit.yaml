language: en-US
early_access: false
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_instructions:
    - path: "**/*.py"
      instructions: |
        Review for correctness, edge cases (empty graph, single node, cycles), and Python typing consistency.
    - path: "**/*.{ts,tsx}"
      instructions: |
        Follow the project's Next.js 16 + React 19 conventions. Check Tailwind v4 usage (no @tailwind directives).
chat:
  auto_reply: true
